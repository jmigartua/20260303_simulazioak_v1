name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run import-flow guardrail
        run: python scripts/check_import_flow.py

      - name: Run release consistency guardrail
        run: python scripts/check_release_consistency.py

      - name: Run tests
        run: python -m pytest -v

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel in clean venv
        run: |
          python -m venv wheel_smoke_venv
          wheel_smoke_venv/bin/python -m pip install --upgrade pip
          wheel_smoke_venv/bin/python -m pip install dist/*.whl

      - name: Run wheel smoke test
        run: |
          wheel_smoke_venv/bin/sim-run \
            --scenario ants_foraging \
            --ticks 2 \
            --ants 5 \
            --runtime-mode headless > smoke.json
          wheel_smoke_venv/bin/python - <<'PY'
          import json
          payload = json.load(open("smoke.json", "r", encoding="utf-8"))
          assert payload["run"]["ticks_completed"] == 2
          assert payload["runtime"]["mode"] == "headless"
          assert payload["runtime"]["emit_snapshot_events"] is False
          PY

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/*
